name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Verify spec version matches tag
      run: |
        TAG=${GITHUB_REF#refs/tags/v}
        SPEC_VERSION=$(grep "^Version " SPEC.md | head -1 | sed 's/^Version \([^ ]*\).*/\1/')
        if [ "$TAG" != "$SPEC_VERSION" ]; then
          echo "Error: Tag version ($TAG) does not match SPEC.md version ($SPEC_VERSION)"
          exit 1
        fi
    
    - name: Check release version consistency
      run: make check-release-version
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Run tests
      run: make test
    
    - name: Run linter
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
    
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
