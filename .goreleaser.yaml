version: 2

project_name: gsl-lang

# No builds for library-only project
# Releases are source-code only via GitHub

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: dnnrly
    name: gsl-lang
  draft: false
  prerelease: auto
  name_template: '{{.ProjectName}} {{.Version}}'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
