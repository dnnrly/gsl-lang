version: 2

project_name: gsl-lang

# Build both CLI tools
builds:
  - id: gsl-diagram
    main: ./cmd/gsl-diagram
    binary: gsl-diagram
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64, 386]
  - id: gsl-query
    main: ./cmd/gsl-query
    binary: gsl-query
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64, 386]

archives:
  - format: tar.gz
    os: [linux, darwin]
  - format: zip
    os: [windows]

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: dnnrly
    name: gsl-lang
  draft: false
  prerelease: auto
  name_template: '{{.ProjectName}} {{.Version}}'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
